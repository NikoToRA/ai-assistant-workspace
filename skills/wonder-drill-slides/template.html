<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>提案資料 — Wonder Drill</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* =====================================================
   Wonder Drill 株式会社 — スタンドアロン HTML スライドテーマ
   ブランドカラー: #002d80（紺）/ #0055cc（青）/ #007be8（明青）
   スライドサイズ: 1280 × 720px (16:9)
===================================================== */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #444;
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
}

/* ---- スライドベース ---- */
.slide {
  width: 1280px;
  height: 720px;
  background: linear-gradient(160deg, #f2f8ff 0%, #ddeeff 100%);
  color: #1a2e4a;
  font-size: 16px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  margin: 24px auto;
  box-shadow: 0 6px 24px rgba(0,0,0,0.35);
}

/* ---- 印刷・PDF用 ---- */
@media print {
  html, body { background: white; }
  .slide {
    width: 100%;
    height: 100vh;
    margin: 0;
    box-shadow: none;
    page-break-after: always;
    break-after: page;
  }
  .slide:last-child { page-break-after: avoid; break-after: avoid; }
}
@page {
  size: 338.67mm 190.5mm; /* 1280×720px @ 96dpi */
  margin: 0;
}

/* ---- 表紙スライド ---- */
.slide-cover {
  flex-direction: row;
}

/* ---- ヘッダー h1 ---- */
.slide h1 {
  background: linear-gradient(135deg, #002d80, #0055cc, #007be8);
  color: white;
  font-size: 1.25em;
  font-weight: bold;
  margin: 0;
  padding: 12px 44px;
  letter-spacing: 0.02em;
  box-shadow: 0 3px 8px rgba(0,50,140,0.25);
  line-height: 1.3;
  flex-shrink: 0;
}

.slide h2 {
  font-size: 0.95em;
  color: #002d80;
  border-bottom: 2px solid rgba(0,80,200,0.22);
  padding-bottom: 4px;
  margin: 0 0 8px 0;
}

/* ---- ボディラッパー ---- */
.body {
  padding: 12px 44px 46px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* ---- フッター ---- */
.ft {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 36px;
  background: rgba(0,50,160,0.08);
  border-top: 1.5px solid rgba(0,100,200,0.2);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 44px;
  font-size: 0.62em;
  color: #0044aa;
}
.ft img { height: 17px; }

/* ---- グリッド ---- */
.g2  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.g3  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.g64 { display: grid; grid-template-columns: 6fr 4fr; gap: 12px; }

/* ---- カードボックス ---- */
.bw {
  background: rgba(255,255,255,0.82);
  border: 1px solid rgba(0,100,200,0.15);
  border-radius: 8px;
  padding: 11px 15px;
  box-shadow: 0 2px 6px rgba(0,50,150,0.07);
}
.bb {
  background: rgba(0,70,200,0.07);
  border-left: 4px solid #0055cc;
  border-radius: 0 8px 8px 0;
  padding: 11px 15px;
}
.bg {
  background: linear-gradient(135deg,#f0fff6,#ccffe0);
  border: 1.5px solid #009944;
  border-radius: 8px;
  padding: 11px 15px;
}
.by {
  background: linear-gradient(135deg,#fffbe6,#fff3bb);
  border: 1.5px solid #cc9900;
  border-radius: 8px;
  padding: 11px 15px;
}
.br {
  background: linear-gradient(135deg,#fff5f5,#ffe8e8);
  border: 1.5px solid #cc2200;
  border-radius: 8px;
  padding: 11px 15px;
}

/* ---- テーブル ---- */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.87em;
  background: rgba(255,255,255,0.75);
  border-radius: 8px;
  overflow: hidden;
}
th {
  background: #002d80;
  color: white;
  padding: 8px 12px;
  text-align: left;
  font-weight: bold;
}
th:last-child, td:last-child { text-align: right; }
td {
  padding: 7px 12px;
  border-bottom: 1px solid rgba(0,80,200,0.1);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: rgba(0,80,200,0.04); }
.tt td { background: #002d80 !important; color: white !important; font-weight: bold; font-size: 1.02em; }
.ty td { background: #fff3bb !important; font-weight: bold; color: #7a4a00 !important; }

/* ---- テキスト ---- */
p  { margin: 5px 0; line-height: 1.5; }
ul { margin: 4px 0; padding-left: 17px; }
li { margin: 3px 0; line-height: 1.5; }
small { font-size: 0.76em; color: #666; }
strong { font-weight: 700; }

/* ---- デコレーション ---- */
.al {
  height: 3px;
  background: linear-gradient(90deg,#0033aa,#0088ee,#00ccff);
  border-radius: 2px;
  margin: 8px 0;
}
.sep {
  height: 1px;
  background: rgba(0,80,200,0.15);
  margin: 8px 0;
}

/* ---- ステップバッジ ---- */
.sb {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  min-width: 26px;
  background: #002d80;
  color: white;
  border-radius: 50%;
  font-weight: bold;
  font-size: 0.85em;
  margin-right: 8px;
}
.sr { display: flex; align-items: flex-start; margin: 6px 0; }
.st { flex: 1; padding-top: 3px; }
</style>
</head>
<body>

<!-- ==================== SLIDE 1: 表紙 ==================== -->
<section class="slide slide-cover">

  <!-- 左：ブルーサイドバー -->
  <div style="width:260px;min-width:260px;background:linear-gradient(180deg,#001f6b,#0044bb,#0066dd);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;">
    <img src="../notes/wonder-drill-logo.png" style="width:160px;height:auto;filter:brightness(0) invert(1);">
  </div>

  <!-- 右：コンテンツ -->
  <div style="flex:1;display:flex;flex-direction:column;padding:56px 80px 44px;">
    <div style="flex:1;"></div>
    <div>
      <div style="font-size:12px;color:#0055cc;font-weight:bold;letter-spacing:6px;margin-bottom:16px;">PROPOSAL</div>
      <div style="font-size:80px;font-weight:900;color:#0055cc;line-height:1;margin-bottom:16px;">提案資料</div>
      <div style="height:3px;background:linear-gradient(90deg,#0033aa 0%,#0088ee 50%,#00ccff 80%,transparent 100%);border-radius:2px;margin:0 0 24px 0;"></div>
      <div style="font-size:18px;color:#555;letter-spacing:1px;margin-bottom:14px;font-weight:bold;line-height:1.7;">
        厚生労働省 令和8年度<br>業務効率化ICT補助金 活用のご提案
      </div>
      <div style="font-size:24px;font-weight:900;color:#1a2e4a;line-height:1.6;">
        コエレク導入および<br>研修プログラムについて
      </div>
    </div>
    <div style="flex:2;display:flex;flex-direction:column;justify-content:flex-end;">
      <div style="height:1px;background:rgba(0,80,200,0.2);margin-bottom:14px;"></div>
      <div style="font-size:14px;color:#444;font-weight:bold;">Wonder Drill 株式会社</div>
      <div style="font-size:13px;color:#888;margin-top:5px;">{{年月}}</div>
    </div>
  </div>

</section>

<!-- ==================== SLIDE 2 以降 ==================== -->
<section class="slide">
  <h1>スライドタイトル</h1>
  <div class="body">
    <!-- コンテンツ -->
  </div>
  <div class="ft">
    <img src="../notes/wonder-drill-logo.png">
    <span>support@wonder-drill.com</span>
  </div>
</section>

</body>
</html>
